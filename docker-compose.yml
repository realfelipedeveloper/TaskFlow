services:
  mysql-db:
    image: mysql:8.0
    container_name: taskflow-mysql-dev
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-tasks}
      MYSQL_USER: ${MYSQL_USER:-taskflow}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-taskflow}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - taskflow_mysql_dev_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root --password=$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 10

  nest-api:
    build:
      context: ./tasks-api
    container_name: taskflow-api-dev
    working_dir: /app
    depends_on:
      mysql-db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-mysql://taskflow:taskflow@mysql-db:3306/tasks}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_me}
      PORT: ${PORT:-3001}
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-true}
    ports:
      - "${API_PORT:-3001}:${PORT:-3001}"
    volumes:
      - ./tasks-api:/app
      - taskflow_api_dev_node_modules:/app/node_modules
      - ./tasks-api/public/uploads:/app/public/uploads
    command: sh -c "npm install && npx prisma generate && npx prisma db push && npm run start:dev"
    restart: unless-stopped

  tasks-web:
    build:
      context: ./tasks-web
    container_name: taskflow-web-dev
    working_dir: /app
    depends_on:
      - nest-api
    environment:
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-true}
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - ./tasks-web:/app
      - taskflow_web_dev_node_modules:/app/node_modules
      - taskflow_web_dev_next:/app/.next
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: taskflow-nginx-dev
    depends_on:
      - tasks-web
      - nest-api
    ports:
      - "${HTTP_PORT:-8081}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  taskflow_mysql_dev_data:
  taskflow_api_dev_node_modules:
  taskflow_web_dev_node_modules:
  taskflow_web_dev_next:
