services:
  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: tasks
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  nest-api:
    build: ./tasks-api
    container_name: nest-api
    working_dir: /app
    depends_on:
      mysql-db:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://root:@mysql-db:3306/tasks
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3001:3001"
    volumes:
      - ./tasks-api:/app
      - node_modules:/app/node_modules
    command: sh -c "npm install && npx prisma generate && npx prisma db push --accept-data-loss && npm run start:dev"
    restart: always
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"const s=require('net').connect(3001,'127.0.0.1');s.on('connect',()=>{s.end();process.exit(0)});s.on('error',()=>process.exit(1));setTimeout(()=>process.exit(1),2000)\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  tasks-web:
    build: ./tasks-web
    container_name: tasks-web
    volumes:
      - ./tasks-web:/app
      - /app/node_modules
      - /app/.next
    working_dir: /app
    depends_on:
      nest-api:
        condition: service_healthy
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev"
    restart: always
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"const s=require('net').connect(3000,'127.0.0.1');s.on('connect',()=>{s.end();process.exit(0)});s.on('error',()=>process.exit(1));setTimeout(()=>process.exit(1),2000)\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  nginx:
    image: nginx:alpine
    container_name: taskflow-nginx
    depends_on:
      tasks-web:
        condition: service_healthy
      nest-api:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: always

volumes:
  mysql_data:
  node_modules:
