services:
  mysql-db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - taskflow_mysql_prod_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root --password=$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 10

  nest-api:
    build:
      context: ./tasks-api
    depends_on:
      mysql-db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3001
    volumes:
      - taskflow_api_prod_uploads:/app/public/uploads
    command: sh -c "npm run prisma:deploy && node dist/src/main.js"
    restart: unless-stopped

  tasks-web:
    build:
      context: ./tasks-web
    depends_on:
      - nest-api
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    depends_on:
      - tasks-web
      - nest-api
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  taskflow_mysql_prod_data:
  taskflow_api_prod_uploads:
